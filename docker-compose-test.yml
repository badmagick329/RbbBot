services:
  test-db:
    image: postgres:13
    environment:
      POSTGRES_USER: rbb_test
      POSTGRES_PASSWORD: rbb_test
      POSTGRES_DB: rbb_test
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbb_test -d rbb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - rbb_test_db:/var/lib/postgresql/data

volumes:
  rbb_test_db:
    name: rbb_test_db
